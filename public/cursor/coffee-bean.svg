<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="beanGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#6b4f47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3c2218;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b180f;stop-opacity:1" />
    </radialGradient>
    <filter id="beanShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Grano de café (forma ovalada con pequeña hendidura central) -->
  <ellipse cx="50" cy="60" rx="35" ry="50" fill="url(#beanGradient)" filter="url(#beanShadow)"/>

  <!-- Hendidura central (línea oscura) -->
  <path d="M 50 20 Q 48 60 50 100" stroke="#0f1f1a" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Highlight sutil (luz refleja) -->
  <ellipse cx="35" cy="40" rx="12" ry="18" fill="white" opacity="0.15"/>
</svg>
