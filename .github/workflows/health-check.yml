name: Daily Health Check

# Verifica diariamente que el sitio en producción esté sano:
# rutas públicas críticas, endpoint /api/health, cabeceras de seguridad.
# Si algo falla, el job falla (rojo) y queda registrado en Actions.

on:
  schedule:
    # 13:00 UTC = 08:00 hora de Perú (UTC-5), todos los días.
    - cron: "0 13 * * *"
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: read
  issues: write # para abrir/actualizar un issue cuando falla

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run health check
        id: check
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.flordealtura.com' }}
        run: node scripts/health-check.mjs

      # Si el health check falla, abre (o reutiliza) un issue con el detalle.
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Health check de producción falló";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `El health check diario de producción falló el ${new Date().toISOString()}.`,
              "",
              `**Sitio:** ${process.env.SITE_URL || 'https://www.flordealtura.com'}`,
              `**Detalle del run:** ${runUrl}`,
              "",
              "Revisa el log del job para ver qué ruta o dependencia falló.",
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "health-check",
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["health-check"],
              });
            }
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.flordealtura.com' }}
